<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, email=no, address=no">
    <title>Serening Bee</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="loading-overlay">Loading Dictionaries...</div>
    <div id="game-container" style="display: none;">
<div id="top-bar">
            <select id="lang-toggle" class="control-btn">
                <option value="en">English</option>
                <option value="it">Italian</option>
            </select>
            <div id="top-right-controls" style="display: flex; gap: 10px;">
                <button id="btn-help" class="control-btn icon-btn" aria-label="Help">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                </button>
                <button id="btn-new-game" class="control-btn">New Game</button>
            </div>
        </div>
        <div id="score-board">Score: <span id="score-value">0</span></div>
        <div id="message-box"></div>
        <div id="input-display">
            <span id="current-input"></span><span class="cursor">|</span>
        </div>
        
        <div id="honeycomb">
            <div class="row">
                <button class="hex-btn outer" data-letter=""></button>
                <button class="hex-btn outer" data-letter=""></button>
            </div>
            <div class="row">
                <button class="hex-btn outer" data-letter=""></button>
                <button class="hex-btn center" data-letter=""></button>
                <button class="hex-btn outer" data-letter=""></button>
            </div>
            <div class="row">
                <button class="hex-btn outer" data-letter=""></button>
                <button class="hex-btn outer" data-letter=""></button>
            </div>
        </div>

<div id="controls">
            <button id="btn-delete" class="control-btn icon-btn" aria-label="Delete">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>
            </button>
            <button id="btn-shuffle" class="control-btn icon-btn" aria-label="Shuffle">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
            </button>
            <button id="btn-enter" class="control-btn icon-btn" aria-label="Enter">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><polyline points="9 10 4 15 9 20"></polyline><path d="M20 4v7a4 4 0 0 1-4 4H4"></path></svg>
            </button>
        </div>

<div id="word-list">
            <h3>Found Words</h3>
            <ul id="found-words-ul"></ul>
        </div>
    </div> <div id="rules-modal" class="modal-hidden">
        <div class="modal-content">
            <h2 id="rules-title">Serening Bee Rules</h2>
            <ul id="rules-text"></ul>
            <button id="btn-close-rules" class="control-btn">Close</button>
        </div>
    </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
